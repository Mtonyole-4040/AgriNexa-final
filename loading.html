<!DOCTYPE html>
<html lang="en">
<head>

<style>

display:flex;
justify-content:center;

.loader{
width:120px;
height:120px;
border:12px solid #333;

@keyframes spin{

transform:rotate(360deg);
}
}

text-shadow:0 0 18px #e5ff00;
}

</style>
</head>

<body>
