<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriNEXA Onboarding</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
padding:40px;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

.container{
background:rgba(20,20,20,0.9);
padding:40px;
border-radius:30px;
backdrop-filter:blur(10px);
}

h1{
color:#e5ff00;
font-size:55px;
margin-bottom:10px;
text-shadow:0 0 18px #e5ff00;
}

.sub{
color:white;
margin-bottom:35px;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.field{
display:flex;
flex-direction:column;
}

label{
color:#e5ff00;
font-weight:bold;
margin-bottom:10px;
font-size:18px;
}

input,
select{
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:20px;
margin-top:35px;
border:none;
border-radius:14px;
background:#e5ff00;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Hello Farmer 👋 I am AgriNEXA AI</h1>

<div class="sub">
Let me understand your farm and generate smart agricultural intelligence.
</div>

<div class="grid">

<div class="field">
<label>👤 Farmer Name</label>
<input type="text" id="name" placeholder="Your Name">
</div>

<div class="field">
<label>🌍 Region</label>
<select id="region">
<option>Arusha</option>
<option>Dodoma</option>
<option>Mbeya</option>
<option>Mwanza</option>
<option>Dar es Salaam</option>
</select>
</div>

<div class="field">
<label>🌱 Crop Type</label>
<select id="crop">
<option>Coffee</option>
<option>Maize</option>
<option>Rice</option>
<option>Beans</option>
<option>Tea</option>
</select>
</div>

<div class="field">
<label>📏 Farm Size (Acres)</label>
<input type="number" id="farmSize">
</div>

<div class="field">
<label>💰 Estimated Budget</label>
<input type="number" id="budget">
</div>

<div class="field">
<label>☀ Current Weather</label>
<select>
<option>Sunny</option>
<option>Rainy</option>
<option>Cloudy</option>
</select>
</div>

<div class="field">
<label>🛡 Do you have Insurance?</label>
<select id="insurance">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>🏢 Insurance Provider</label>
<select id="provider">
<option>NIC</option>
<option>Jubilee</option>
<option>Heritage</option>
<option>None</option>
</select>
</div>

<div class="field">
<label>🧠 Emotional State</label>
<select id="emotion">
<option>Confident</option>
<option>Worried</option>
<option>Stressed</option>
<option>Motivated</option>
</select>
</div>

</div>

<button onclick="saveData()">
Generate AgriNEXA AI Insights
</button>

</div>

<script>

function saveData(){

localStorage.setItem("farmerName",
document.getElementById("name").value);

localStorage.setItem("region",
document.getElementById("region").value);

localStorage.setItem("crop",
document.getElementById("crop").value);

localStorage.setItem("farmSize",
document.getElementById("farmSize").value);

localStorage.setItem("budget",
document.getElementById("budget").value);

localStorage.setItem("insurance",
document.getElementById("insurance").value);

localStorage.setItem("insuranceProvider",
document.getElementById("provider").value);

localStorage.setItem("emotion",
document.getElementById("emotion").value);

window.location.href="loading.html";

}

</script>

</body>
</html>
